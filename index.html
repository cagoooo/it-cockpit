<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  :root {
    --bg: #06061a;
    --surface: rgba(15,15,40,0.6);
    --text: #e8e4f8;
    --dim: #a8aad8;
    --mute: #7070a0;
    --line: rgba(255,255,255,0.06);
    --line-2: #1f1f4a;
    --line-3: #2a2a55;
    --accent-a: #00e5ff;
    --accent-b: #ffd740;
  }
  body {
    background: var(--bg);
    background-image:
      radial-gradient(1000px 600px at 12% 0%, rgba(0,229,255,0.10) 0%, transparent 60%),
      radial-gradient(800px 500px at 92% 6%, rgba(255,215,64,0.08) 0%, transparent 55%),
      radial-gradient(600px 400px at 50% 100%, rgba(179,136,255,0.06) 0%, transparent 60%),
      linear-gradient(180deg, #08081e 0%, #04041a 100%);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; }

  .mono { font-family: 'Press Start 2P', monospace; letter-spacing: 1px; }
  .grad-text {
    background: linear-gradient(90deg, var(--accent-a) 0%, var(--accent-b) 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
  }

  /* nav */
  .nav {
    position: sticky; top: 0; z-index: 10;
    border-bottom: 1px solid var(--line);
    background: rgba(8,8,30,0.7);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }
  .nav-inner {
    max-width: 1240px; margin: 0 auto; padding: 14px 28px;
    display: flex; justify-content: space-between; align-items: center;
    gap: 16px; flex-wrap: wrap;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-mark {
    width: 44px; height: 44px;
    background: #0a0a22; border: 2px solid var(--line-2);
    display: flex; align-items: center; justify-content: center; gap: 3px;
    font-family: 'Press Start 2P', monospace; font-size: 13px; letter-spacing: 1px;
  }
  .logo-mark .l-i { color: var(--accent-a); }
  .logo-mark .l-t { color: var(--accent-b); }
  .logo-title { font-family: 'Press Start 2P', monospace; letter-spacing: 1px; font-size: 11px; color: #fff; margin-bottom: 4px; }
  .logo-sub { font-size: 10px; color: var(--mute); }
  .nav-right { display: flex; gap: 4px; flex-wrap: wrap; }
  .nav-link {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; color: #c0c2e8; font-size: 13px; font-weight: 500;
  }
  .nav-dot { width: 8px; height: 8px; border-radius: 50%; }
  .nav-count { font-family: 'Press Start 2P', monospace; letter-spacing: 1px; font-size: 8px; color: var(--mute); }

  /* hero */
  .hero { max-width: 1240px; margin: 0 auto; padding: 70px 28px 50px; }
  .hero-grid { display: grid; gap: 60px; align-items: center; grid-template-columns: 1.2fr 1fr; }
  @media (max-width: 880px) { .hero-grid { grid-template-columns: 1fr; gap: 40px; } }
  .kicker {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'Press Start 2P', monospace; letter-spacing: 1px; font-size: 9px;
    margin-bottom: 28px; padding: 8px 14px;
    color: var(--accent-a);
    border: 1px solid rgba(0,229,255,0.33);
    background: rgba(0,229,255,0.06);
  }
  .kicker-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent-a);
    box-shadow: 0 0 6px var(--accent-a);
  }
  .hero-title {
    font-size: clamp(40px, 5vw, 68px);
    font-weight: 900; line-height: 1.14; color: #fff;
    margin: 0 0 24px; letter-spacing: 0.005em;
  }
  .hero-lead {
    font-size: 16px; line-height: 1.85; color: var(--dim);

  .hero-ctas { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 28px; }
  .cta-primary {
    display: inline-flex; align-items: center; gap: 12px;

    transition: transform .15s, box-shadow .15s;

  .cta-primary:hover { transform: translate(-2px, -2px); box-shadow: 7px 7px 0 var(--accent-b), 12px 12px 0 #000; }
  .cta-arrow { font-family: 'Press Start 2P', monospace; letter-spacing: 1px; font-size: 14px; }
  .cta-ghost {
    padding: 16px 24px;
    border: 2px solid var(--line-3);
    color: #c0c2e8; font-size: 15px; font-weight: 700;
    transition: border-color .15s, color .15s;
  }
  .cta-ghost:hover { border-color: var(--accent-a); color: #fff; }
  .hero-meta {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    color: var(--mute); font-size: 12px;
  }
  .meta-pill {
    font-family: 'Press Start 2P', monospace; letter-spacing: 1px; font-size: 9px;
    border: 1px solid var(--line-3); padding: 5px 10px; color: #9ea0d8;
  }
  .meta-sep { color: #3a3a5a; }
  .meta-text { color: #9ea0d8; }

  /* viewport / radar */
  .viewport {
    background: #08081e; border: 2px solid var(--line-2);
    box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,229,255,0.08);
  }
  .vp-header {
    display: flex; align-items: center; gap: 7px;
    padding: 10px 14px;
    background: #04041a; border-bottom: 1px solid var(--line-2);
  }
  .vp-dot { width: 9px; height: 9px; border-radius: 50%; }
  .vp-dot-1 { background: #ff5f57; }
  .vp-dot-2 { background: #febc2e; }
  .vp-dot-3 { background: #28c840; }
  .vp-title {
    font-family: 'Press Start 2P', monospace; letter-spacing: 1px; font-size: 9px;
    color: var(--mute); margin-left: 10px; flex: 1;
  }
  .vp-status {
    font-family: 'Press Start 2P', monospace; letter-spacing: 1px; font-size: 9px;
    color: #69ff47;
  }
  .vp-body { padding: 24px; }
  .radar {
    position: relative; width: 100%; aspect-ratio: 1 / 1;
    max-height: 320px; margin: 0 auto 18px;
    border: 1px solid rgba(0,229,255,0.25);
    background: radial-gradient(circle, rgba(0,229,255,0.05) 0%, transparent 70%);
    overflow: hidden;
  }
  .radar-ring {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%; border: 1px solid rgba(0,229,255,0.19);
  }
  .radar-ring.r1 { width: 100%; height: 100%; }
  .radar-ring.r2 { width: 70%; height: 70%; border-color: rgba(0,229,255,0.15); }
  .radar-ring.r3 { width: 40%; height: 40%; border-color: rgba(0,229,255,0.13); }
  .radar-cross-v { position: absolute; top: 0; left: 50%; width: 1px; height: 100%; background: rgba(255,255,255,0.05); }
  .radar-cross-h { position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: rgba(255,255,255,0.05); }
  .radar-sweep {
    position: absolute; top: 0; left: 50%;
    width: 50%; height: 50%;
    transform-origin: 0% 100%;
    background: linear-gradient(90deg, rgba(0,229,255,0.33) 0%, transparent 100%);
    animation: radar-sweep 4s linear infinite;
  }
  .blip {
    position: absolute; width: 8px; height: 8px; border-radius: 50%;
    animation: blip-pulse 2s ease-in-out infinite;
  }
  .vp-stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px; background: var(--line-2);
  }
  .vstat { background: #08081e; padding: 14px 10px; text-align: center; }
  .vstat-v { font-family: 'Press Start 2P', monospace; letter-spacing: 1px; font-size: 22px; margin-bottom: 6px; }
  .vstat-k { font-family: 'Press Start 2P', monospace; letter-spacing: 1px; font-size: 8px; color: var(--mute); }

  @keyframes radar-sweep { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  @keyframes blip-pulse {
    0%, 100% { transform: scale(1); opacity: 0.9; }
    50% { transform: scale(1.6); opacity: 0.4; }
  }

  /* tracks */
  .tracks { max-width: 1240px; margin: 0 auto; padding: 30px 28px 20px; }
  .tracks-head { margin-bottom: 24px; }
  .eyebrow { font-family: 'Press Start 2P', monospace; letter-spacing: 1px; font-size: 9px; color: var(--mute); margin-bottom: 10px; }
  .tracks-title { font-size: 26px; font-weight: 900; color: #fff; margin: 0; }
  .tracks-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 14px;
  }
  .track {
    display: flex; overflow: hidden;
    background: var(--surface);
    border: 1px solid;
    transition: transform .15s, border-color .15s;
  }
  .track:hover { transform: translateY(-2px); }
  .track-bar { width: 4px; flex-shrink: 0; }
  .track-body { padding: 20px 22px; flex: 1; }
  .track-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .track-badge {
    font-family: 'Press Start 2P', monospace; letter-spacing: 1px; font-size: 10px;
    border: 2px solid; padding: 6px 10px;
  }
  .track-num { font-family: 'Press Start 2P', monospace; letter-spacing: 1px; font-size: 9px; color: #4a4a7a; }
  .track-label { font-size: 18px; font-weight: 900; color: #fff; margin: 0 0 4px; }
  .track-name { font-size: 14px; color: #c0c2e8; margin-bottom: 10px; font-weight: 500; }
  .track-caption { font-size: 13px; color: #9ea0d8; margin-bottom: 14px; line-height: 1.6; }
  .track-arrow { font-size: 13px; font-weight: 700; }

  /* section */
  .section { max-width: 1240px; margin: 0 auto; padding: 30px 28px 20px; }
  .section-head {
    display: flex; align-items: center; gap: 16px; margin-bottom: 22px; flex-wrap: wrap;
  }
  .section-badge {
    display: flex; align-items: center; gap: 10px;
    border: 2px solid; padding: 9px 14px;
    background: var(--surface);
  }
  .section-badge-num { font-family: 'Press Start 2P', monospace; letter-spacing: 1px; font-size: 14px; }
  .section-badge-label { font-weight: 700; font-size: 13px; color: #fff; }
  .section-title { font-size: 22px; font-weight: 900; color: #fff; margin: 0; }
  .section-rule { flex: 1; height: 1px; min-width: 30px; }
  .section-meta { font-family: 'Press Start 2P', monospace; letter-spacing: 1px; font-size: 9px; color: var(--mute); }

  /* cards */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 14px;
  }
  .card {
    position: relative; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
    padding: 22px 22px 20px;
    color: var(--text); display: block;
    background: rgba(15,15,40,0.55);
    box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset;
    transition: transform .2s ease, border-color .2s ease, box-shadow .25s ease, background .25s ease;
  }
  .card:hover {
    transform: translateY(-4px);
    background: linear-gradient(180deg, rgba(20,20,55,0.92) 0%, rgba(15,15,40,0.92) 100%);
  }
  .card-glow {
    position: absolute; inset: 0; pointer-events: none;
    opacity: 0; transition: opacity .25s;
  }
  .card:hover .card-glow { opacity: 1; }
  .card-topbar {
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    opacity: 0.5; transition: opacity .2s;
  }
  .card:hover .card-topbar { opacity: 1; }
  .card-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; margin-top: 4px; position: relative;
  }
  .card-icon {
    width: 44px; height: 44px;
    border: 2px solid;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Press Start 2P', monospace; letter-spacing: 1px; font-size: 13px;
  }
  .card-cat { font-family: 'Press Start 2P', monospace; letter-spacing: 1px; font-size: 9px; }
  .card-title {
    font-size: 19px; font-weight: 900; color: #fff;
    line-height: 1.4; margin: 0 0 10px; position: relative;
  }
  .card-desc {
    font-size: 13.5px; line-height: 1.7; color: var(--dim);
    margin: 0 0 18px; position: relative; min-height: 70px;
  }
  .card-cta {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 14px; border-top: 1px solid var(--line);
    font-size: 13px; position: relative;
  }
  .card-cta-text { font-weight: 700; letter-spacing: 0.3px; }
  .card-arrow {
    font-family: 'Press Start 2P', monospace; letter-spacing: 1px; font-size: 13px;
    transition: transform .2s;
  }
  .card:hover .card-arrow { transform: translateX(8px); }

  /* footer */
  .footer {
    margin-top: 50px; padding: 30px 28px;
    border-top: 1px solid var(--line);
    background: rgba(4,4,20,0.5);
  }
  .footer-inner {
    max-width: 1240px; margin: 0 auto;
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 16px;
  }
  .footer-dim { color: var(--mute); font-size: 12px; margin-top: 4px; }
  .footer-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .footer-mono { font-family: 'Press Start 2P', monospace; letter-spacing: 1px; font-size: 9px; color: #9ea0d8; }

  a:focus-visible, button:focus-visible {
    outline: 2px solid var(--accent-a);
    outline-offset: 4px;
  }
</style>
</head>

<script>

  const GRADES = [
    { grade: 3, label: "三年級", short: "G3", color: "#ff9800",
      track: "資訊基礎課程", caption: "電腦入門 · 英文打字" },
    { grade: 5, label: "五年級", short: "G5", color: "#00ff88",
      track: "程式設計課程", caption: "Scratch 動畫 · 遊戲" },
    { grade: 6, label: "六年級", short: "G6", color: "#b388ff",
      track: "AI 與媒體素養", caption: "AI 創作 · 媒體識讀 · 科技穿戴" },
  ];

  const ACCENT = { a: "#00e5ff", b: "#ffd740" };

  // Helpers
  const el = (tag, attrs = {}, children = []) => {
    const node = document.createElement(tag);
    for (const [k, v] of Object.entries(attrs)) {
      if (k === "style" && typeof v === "object") {
        for (const [sk, sv] of Object.entries(v)) node.style[sk] = sv;
      } else if (k === "class") {
        node.className = v;
      } else if (k === "html") {
        node.innerHTML = v;
      } else if (k === "text") {
        node.textContent = v;
      } else {
        node.setAttribute(k, v);
      }
    }
    for (const c of [].concat(children)) {
      if (c == null) continue;
      node.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
    }
    return node;
  };

  function renderNav() {
    const counts = Object.fromEntries(GRADES.map(g => [g.grade, MODULES.filter(m => m.grade === g.grade).length]));
    return el("nav", { class: "nav" }, [
      el("div", { class: "nav-inner" }, [
        el("a", { class: "logo", href: "#top" }, [
          el("div", { class: "logo-mark" }, [
            el("span", { class: "l-i", text: "I" }),
            el("span", { class: "l-t", text: "T" }),
          ]),
          el("div", {}, [
            el("div", { class: "logo-title", text: "IT COCKPIT" }),
            el("div", { class: "logo-sub", text: "教學駕駛艙 · v2026" }),
          ]),
        ]),
        el("div", { class: "nav-right" },
          GRADES.map(g => el("a", { class: "nav-link", href: `#grade-${g.grade}` }, [
            el("span", { class: "nav-dot", style: { background: g.color } }),
            document.createTextNode(g.label),
            el("span", { class: "nav-count", text: String(counts[g.grade]) }),
          ]))
        ),
      ]),
    ]);
  }

  function renderHero() {
    const blips = [
      { top: "22%", left: "30%", color: "#ff9800" },
      { top: "55%", left: "65%", color: "#00ff88" },
      { top: "70%", left: "25%", color: "#b388ff" },
      { top: "30%", left: "75%", color: ACCENT.a },
      { top: "48%", left: "48%", color: ACCENT.b },
      { top: "40%", left: "20%", color: "#ff4081" },
      { top: "62%", left: "78%", color: "#69ff47" },
    ];
    return el("header", { id: "top", class: "hero" }, [
      el("div", { class: "hero-grid" }, [
        el("div", {}, [
          el("div", { class: "kicker" }, [
            el("span", { class: "kicker-dot" }),
            document.createTextNode("FLIGHT PLAN · 2026"),
          ]),
          el("h1", { class: "hero-title", html: '歡迎登艙<br><span class="grad-text">國小資訊科技</span><br>教學駕駛艙' }),
          el("p", { class: "hero-lead", html: "三、五、六年級・十三大互動教學艙<br>從電腦入門、程式設計，到 AI 創作與媒體識讀，一站式翻轉資訊課堂。" }),
          el("div", { class: "hero-ctas" }, [
            el("a", { class: "cta-primary", href: "#grade-3" }, [
              el("span", { text: "開始飛行" }),
              el("span", { class: "cta-arrow", text: "→" }),
            ]),
            el("a", { class: "cta-ghost", href: "#tracks", text: "查看課程地圖" }),
          ]),
          el("div", { class: "hero-meta" }, [
            el("span", { class: "meta-pill", text: "NotebookLM × Claude Code" }),
            el("span", { class: "meta-sep", text: "·" }),
            el("span", { class: "meta-text", text: "持續更新中" }),
          ]),
        ]),
        el("div", { class: "viewport" }, [
          el("div", { class: "vp-header" }, [
            el("span", { class: "vp-dot vp-dot-1" }),
            el("span", { class: "vp-dot vp-dot-2" }),
            el("span", { class: "vp-dot vp-dot-3" }),
            el("span", { class: "vp-title", text: "cockpit.flight" }),
            el("span", { class: "vp-status", text: "● LIVE" }),
          ]),
          el("div", { class: "vp-body" }, [
            el("div", { class: "radar" }, [
              el("div", { class: "radar-ring r1" }),
              el("div", { class: "radar-ring r2" }),
              el("div", { class: "radar-ring r3" }),
              el("div", { class: "radar-cross-v" }),
              el("div", { class: "radar-cross-h" }),
              el("div", { class: "radar-sweep" }),
              ...blips.map(b => el("div", {
                class: "blip",
                style: { top: b.top, left: b.left, background: b.color, boxShadow: `0 0 10px ${b.color}` },
              })),
            ]),
            el("div", { class: "vp-stats" }, [
              vstat("MISSIONS", String(MODULES.length), ACCENT.a),
              vstat("GRADES", "3", ACCENT.b),
              vstat("SUBJECTS", String(new Set(MODULES.map(m => m.category)).size), "#ff4081"),
            ]),
          ]),
        ]),
      ]),
    ]);
  }
  function vstat(k, v, c) {
    return el("div", { class: "vstat" }, [
      el("div", { class: "vstat-v", text: v, style: { color: c } }),
      el("div", { class: "vstat-k", text: k }),
    ]);
  }

  function renderTracks() {
    return el("section", { id: "tracks", class: "tracks" }, [
      el("div", { class: "tracks-head" }, [
        el("div", { class: "eyebrow", text: "FLIGHT TRACKS · 三大課程主軸" }),
        el("h2", { class: "tracks-title", text: "從入門到 AI 創作的完整航線" }),
      ]),
      el("div", { class: "tracks-grid" },
        GRADES.map((g, i) => {
          const count = MODULES.filter(m => m.grade === g.grade).length;
          return el("a", {
            class: "track",
            href: `#grade-${g.grade}`,
            style: { borderColor: `${g.color}40` },
          }, [
            el("div", { class: "track-bar", style: { background: g.color } }),
            el("div", { class: "track-body" }, [
              el("div", { class: "track-top" }, [
                el("div", { class: "track-badge", style: { color: g.color, borderColor: g.color }, text: g.short }),
                el("div", { class: "track-num", text: `0${i + 1} / 03` }),
              ]),
              el("h3", { class: "track-label", text: g.label }),
              el("div", { class: "track-name", text: g.track }),
              el("p", { class: "track-caption", text: g.caption }),
              el("div", { class: "track-arrow", style: { color: g.color }, text: `查看 ${count} 個任務 →` }),
            ]),
          ]);
        })
      ),
    ]);
  }

  function renderSection(g) {
    const mods = MODULES.filter(m => m.grade === g.grade);
    return el("section", { id: `grade-${g.grade}`, class: "section" }, [
      el("div", { class: "section-head" }, [
        el("div", { class: "section-badge", style: { borderColor: g.color } }, [
          el("span", { class: "section-badge-num", style: { color: g.color }, text: `0${g.grade}` }),
          el("span", { class: "section-badge-label", text: g.label }),
        ]),
        el("h2", { class: "section-title", text: g.track }),
        el("div", {
          class: "section-rule",
          style: { backgroundImage: `linear-gradient(90deg, ${g.color}55 0%, transparent 100%)` },
        }),
        el("div", { class: "section-meta", text: `${mods.length} modules` }),
      ]),
      el("div", { class: "cards" }, mods.map(renderCard)),
    ]);
  }

  function renderCard(m) {
    return el("a", { class: "card", href: m.href }, [
      el("div", {
        class: "card-glow",
        style: { background: `radial-gradient(380px 200px at 50% -20%, ${m.color}28 0%, transparent 70%)` },
      }),
      el("div", { class: "card-topbar", style: { background: m.color } }),
      el("div", { class: "card-head" }, [
        el("div", {
          class: "card-icon",
          style: { color: m.color, borderColor: m.color, background: `${m.color}10` },
          text: m.icon,
        }),
        el("div", { class: "card-cat", style: { color: m.color }, text: m.category }),
      ]),
      el("h3", { class: "card-title", text: m.title }),
      el("p", { class: "card-desc", text: m.desc }),
      el("div", { class: "card-cta" }, [
        el("span", { class: "card-cta-text", style: { color: m.color }, text: "進入駕駛艙" }),
        el("span", { class: "card-arrow", style: { color: m.color }, text: "→" }),
      ]),
    ]);
  }

  function renderFooter() {
    return el("footer", { class: "footer" }, [
      el("div", { class: "footer-inner" }, [
        el("div", {}, [
          el("div", { class: "logo-title", text: "IT COCKPIT · 2026" }),
          el("div", { class: "footer-dim", text: "國小資訊科技教學駕駛艙" }),
        ]),
        el("div", { class: "footer-right" }, [
          el("span", { class: "footer-mono", text: "POWERED BY" }),
          el("span", { class: "footer-mono", style: { color: ACCENT.a }, text: "NOTEBOOKLM" }),
          el("span", { class: "footer-mono", text: "×" }),
          el("span", { class: "footer-mono", style: { color: ACCENT.b }, text: "CLAUDE CODE" }),
        ]),
      ]),
    ]);
  }

  const root = document.getElementById("root");
  root.appendChild(renderNav());
  root.appendChild(renderHero());
  root.appendChild(renderTracks());
  GRADES.forEach(g => root.appendChild(renderSection(g)));
  root.appendChild(renderFooter());
</script>
</body>
</html>
