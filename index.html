<script>
  // ─────────────────────────────────────────────────────────────
  // Akai 排行榜流量歸因 beacon (cagoooo/Akai · toolId 81)
  // 進站時送一次像素 beacon 給 Akai Cloud Function 累計 totalClicks
  // 同分頁 sessionStorage 去重；reload / 短時間重新訪問不會重複計數
  // 完全異步、零阻塞、失敗不影響 cockpit 主流程
  // ─────────────────────────────────────────────────────────────
  (function () {
    try {
      var SENT_KEY = 'akai_beacon_81_sent';
      if (sessionStorage.getItem(SENT_KEY)) return;
      var SID_KEY = 'akai_beacon_sid';
      var sid = sessionStorage.getItem(SID_KEY);
      if (!sid) {
        sid = 'cockpit-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
        sessionStorage.setItem(SID_KEY, sid);
      }
      var device = window.innerWidth < 768 ? 'mobile' : (window.innerWidth < 1024 ? 'tablet' : 'desktop');
      var url = 'https://asia-east1-akai-e693f.cloudfunctions.net/beaconToolClick'
        + '?toolId=81'
        + '&referrer=' + encodeURIComponent(document.referrer || '')
        + '&device=' + device
        + '&sessionId=' + encodeURIComponent(sid);
      // 經典 pixel beacon — 不需 CORS preflight，瀏覽器在 unload 時也會送
      new Image().src = url;
      sessionStorage.setItem(SENT_KEY, '1');
    } catch (e) {
      // 安靜失敗，cockpit 體驗永遠優先
    }
  })();
</script>

        el("p", { class: "lead", html: `國小資訊科技教學駕駛艙 — 三、四、五、六年級，共 <strong>${MODULES.length} 個互動教學艙</strong>。從電腦入門、英文打字、Scratch 程式設計，到 AI 創作、媒體識讀與麥昆機器人，一站翻轉資訊課堂。` }),
        el("div", { class: "ctas" }, [
          el("a", { class: "cta", href: "#g3" }, [
            document.createTextNode("開始飛行"),
            el("span", { class: "cta-arrow", text: "→" }),
          ]),
          el("a", { class: "cta-ghost", href: "#tracks", text: "查看課程地圖" }),
        ]),
        el("div", { class: "creds" }, [
          el("span", { html: '<span class="cred-blink"></span>持續更新中' }),
          el("span", { text: "NOTEBOOKLM × CLAUDE CODE" }),
          el("span", { text: "TAOYUAN · TW" }),
        ]),
      ]),
      el("div", { class: "dash" }, [
        el("div", { class: "dash-head" }, [
          el("div", { class: "dash-title", text: "COCKPIT.HORIZON" }),
          el("div", { class: "dash-status", text: "LIVE" }),
        ]),
        el("div", { class: "horizon" }, [
          el("div", { class: "h-grid" }),
          el("div", { class: "h-pill", text: "ALT 2026 / HDG NW" }),
          el("div", { class: "h-pill right", text: `SPD · ${MODULES.length}` }),
          el("div", { class: "h-center" }),
          ...GRADES.flatMap(g => [
            el("div", { class: "h-marker", style: { top: g.markerPos.top, left: g.markerPos.left, background: g.color } }),
            el("div", { class: "h-label", style: { top: g.markerPos.top, left: g.markerPos.left, background: g.color }, text: g.short }),
          ]),
        ]),
        el("div", { class: "dash-stats" }, [
          dstat("Missions", String(MODULES.length), "#c2410c", "86%"),
          dstat("Grades", String(GRADES.length), "#f4a623", "66%"),
          dstat("Subjects", String(subjects), "#2d8a55", "92%"),
        ]),
      ]),
    ]);
  }
  function dstat(k, v, color, barW) {
    return el("div", { class: "dstat" }, [
      el("div", { class: "dstat-k", text: k }),
      el("div", { class: "dstat-v", text: v, style: { color } }),
      el("div", { class: "dstat-bar" }, [
        el("div", { class: "dstat-bar-fill", style: { width: barW, background: color } }),
      ]),
    ]);
  }

  function renderTracks() {
    const head = el("div", { id: "tracks", class: "wrap tracks-row" }, [
      el("h2", { class: "tracks-h", html: '從入門到 <em>AI 創作</em><br>的完整航線。' }),
      el("div", { class: "tracks-meta", html: `FLIGHT TRACKS<br>${GRADES.length} GRADES · ${MODULES.length} MISSIONS` }),
    ]);
    const grid = el("div", { class: "wrap tracks" }, GRADES.map((g, i) => {
      const count = modulesByGrade(g.grade).length;
      return el("a", { class: "track", href: `#g${g.grade}` }, [
        el("div", { class: "track-stripe", style: { background: g.color } }),
        el("div", { class: "track-top" }, [
          el("span", { class: "track-tag", style: { background: g.color + "26", color: g.color }, text: g.short }),
          el("span", { class: "track-num", text: `${String(i + 1).padStart(2, "0")} / ${String(GRADES.length).padStart(2, "0")}` }),
        ]),
        el("div", { class: "track-grade", text: g.label }),
        el("div", { class: "track-name", text: g.track }),
        el("div", { class: "track-cap", text: g.caption }),
        el("div", { class: "track-foot", style: { color: g.color } }, [
          el("span", { text: `${count} MISSIONS` }),
          el("span", { class: "track-arrow", text: "→" }),
        ]),
      ]);
    }));
    const frag = document.createDocumentFragment();
    frag.appendChild(head);
    frag.appendChild(grid);
    return frag;
  }

  function renderSection(g) {
    const mods = modulesByGrade(g.grade);
    return el("section", { id: `g${g.grade}`, class: "section" }, [
      el("div", { class: "section-head" }, [
        el("div", { class: "section-badge", style: { borderColor: g.color, background: g.color + "14" } }, [
          el("span", { class: "section-badge-num", style: { color: g.color }, text: `0${g.grade}` }),
          el("span", { class: "section-badge-label", text: g.label }),
        ]),
        el("h2", { class: "section-title", text: g.track }),
        el("div", { class: "section-rule", style: { backgroundImage: `linear-gradient(90deg, ${g.color}88 0%, ${g.color}22 50%, transparent 100%)` } }),
        el("div", { class: "section-meta", text: `${mods.length} MISSIONS` }),
      ]),
      el("div", { class: "cards" }, mods.map(renderCard)),
    ]);
  }

  function renderCard(m) {
    return el("a", { class: "card", href: `${m.id}/index.html` }, [
      el("div", { class: "card-stripe", style: { background: m.color } }),
      el("div", { class: "card-head" }, [
        el("div", { class: "card-icon", style: { background: m.color + "1a", color: m.color, borderColor: m.color + "44" }, text: m.short }),
        el("div", { class: "card-cat", style: { color: m.color }, text: m.category }),
      ]),
      el("h3", { class: "card-title", text: m.title }),
      el("p", { class: "card-desc", text: m.desc }),
      el("div", { class: "card-foot" }, [
        el("span", { style: { color: m.color }, text: "進入駕駛艙" }),
        el("span", { class: "card-arrow", style: { color: m.color }, text: "→" }),
      ]),
    ]);
  }

  function renderFooter() {
    return el("footer", { class: "footer" }, [
      el("div", { class: "wrap footer-inner" }, [
        el("div", {}, [
          el("div", { class: "footer-logo" }, [
            el("div", { class: "logo-mark", text: "IT" }),
            el("div", {}, [
              el("div", { class: "logo-title", text: "IT Cockpit · 2026" }),
              el("div", { class: "logo-sub", text: "國小資訊科技教學駕駛艙" }),
            ]),
          ]),
          el("div", { class: "footer-note", html: '<span class="cred-blink" style="display:inline-block; margin-right:8px"></span>持續更新中 · TAOYUAN · TW' }),
          el("div", { class: "footer-author", html: 'Made with ❤️ by <a href="https://www.smes.tyc.edu.tw/?account=ipad" target="_blank" rel="noopener">阿凱老師</a>' }),
        ]),
        el("div", { class: "footer-cred" }, [
          el("span", { class: "footer-cred-label", text: "POWERED BY" }),
          el("span", { class: "footer-cred-row" }, [
            el("strong", { style: { color: "#c2410c" }, text: "NOTEBOOKLM" }),
            el("span", { style: { color: "#1b243866" }, text: "×" }),
            el("strong", { style: { color: "#1b2438" }, text: "CLAUDE CODE" }),
          ]),
        ]),
      ]),
    ]);
  }

  const root = document.getElementById("root");
  root.appendChild(renderNav());
  root.appendChild(renderHero());
  root.appendChild(renderTracks());
  GRADES.forEach(g => root.appendChild(renderSection(g)));
  root.appendChild(renderFooter());

  /* ===== Service Worker：自動更新機制 ===== */
  (function registerSW() {
    if (!('serviceWorker' in navigator)) return;

    let reloaded = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (reloaded) return;
      reloaded = true;
      showUpdateToast();
      setTimeout(() => location.reload(), 800);
    });

    navigator.serviceWorker.register('./sw.js').then(reg => {
      // 頁面變回前景時、每 5 分鐘各檢查一次新版
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) reg.update();
      });
      setInterval(() => reg.update(), 5 * 60 * 1000);

      // 新 SW 安裝完成且有舊 SW 在控制 → 通知舊 SW 讓位
      reg.addEventListener('updatefound', () => {
        const newSW = reg.installing;
        if (!newSW) return;
        newSW.addEventListener('statechange', () => {
          if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
            newSW.postMessage({ type: 'SKIP_WAITING' });
          }
        });
      });
    }).catch(() => { /* file:// 或 SW 不支援時靜默失敗 */ });
  })();

  /* Toast：米黃版（白底 + navy 邊 + navy 字 + 番茄紅進度條） */
  function showUpdateToast() {
    const t = document.createElement('div');
    t.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);' +
      'z-index:99999;padding:14px 22px 16px;background:#fffcf3;color:#1b2438;' +
      'border:1.5px solid #1b2438;border-radius:12px;' +
      'box-shadow:0 12px 30px -10px #1b243833, 0 2px 0 #c2410c;' +
      'font:700 13px "Inter Tight","Noto Sans TC",sans-serif;letter-spacing:0.02em;' +
      'min-width:240px;overflow:hidden;';
    t.innerHTML = '🚀 偵測到新版，正在更新…' +
      '<div style="position:absolute;left:0;right:0;bottom:0;height:3px;background:#c2410c22;overflow:hidden">' +
        '<div style="height:100%;background:#c2410c;width:0;animation:toast-bar .8s linear forwards"></div>' +
      '</div>';
    document.body.appendChild(t);
    if (!document.getElementById('toast-anim-style')) {
      const s = document.createElement('style');
      s.id = 'toast-anim-style';
      s.textContent = '@keyframes toast-bar { from { width: 0 } to { width: 100% } }';
      document.head.appendChild(s);
    }
  }
</script>
