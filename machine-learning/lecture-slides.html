  <button class="nav-btn prev" onclick="navigate(-1)">‹</button>
  <button class="nav-btn next" onclick="navigate(1)">›</button>
  <div class="counter" id="lcounter">1 / 12</div>

  <script>
    let current = 1;
    const total = 12;
    
    function show(n) {
      if(n < 1 || n > total) return;
      document.getElementById(`lslide-${current}`).style.display = 'none';
      current = n;
      document.getElementById(`lslide-${current}`).style.display = 'block';
      document.getElementById('lcounter').textContent = `${current} / ${total}`;
    }
    
    function navigate(dir) {
      show(current + dir);
    }
    
    document.addEventListener('keydown', e => {
      if(e.key === 'ArrowLeft' || e.key === 'PageUp') navigate(-1);
      if(e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') navigate(1);
    });
    
    show(1);
  </script>
